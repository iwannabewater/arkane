version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Tailwind v4 changes PostCSS integration and browser support; migrate it explicitly with UI regression coverage.
      - dependency-name: tailwindcss
        update-types:
          - version-update:semver-major
      # Keep Node type declarations aligned with the Node runtime selected in the CI workflow.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
