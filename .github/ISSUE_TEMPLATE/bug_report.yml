name: Bug report
description: Report application behavior that does not expose sensitive information.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste vault records, master passwords, tokens, or private repository contents here. Report security vulnerabilities through the private advisory link in SECURITY.md.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Describe what happened and which screen was involved.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include device, browser, viewport, and network state without including secrets.
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Deployment or commit
      description: Provide the site URL or commit hash if known.
